[mpd]
# SSH host aliases only resolve for SSH, not for MPD.
# Use an IP address or a resolvable hostname/FQDN here.
host = "localhost"
port = 6600
password = ""

[lastfm]
api_key = "YOUR_LASTFM_API_KEY"
api_secret = "YOUR_LASTFM_API_SECRET"

[cache]
dir = ".gridmode-cache"

[music]
# Optional. Set root when local cover lookup or library mtime sorting should read
# the underlying music directory. Set ssh_host only when that directory is remote.
root = ""
ssh_host = ""
# Optional lossy mirror used when sending albums to a phone. If
# prefer_lossy_for_phone=true, Gridmode sends this copy instead of the full
# source album when it exists. If transcode_missing_lossy=true, the remote music
# host needs ffmpeg so Gridmode can create missing MP3 mirrors from FLAC files.
lossy_root = ""
prefer_lossy_for_phone = true
transcode_missing_lossy = false

[phone]
# Optional. Set enabled=true when an SSH-reachable phone should appear as a tab
# and selected albums should be sendable with "p". The phone and the music host
# both need rsync for transfers. Termux phones usually need openssh + rsync and
# an ssh_host alias that points at port 8022.
enabled = false
ssh_host = ""
# Example Android/Termux target: "/storage/emulated/0/Android/media/lifeboat"
music_root = ""

[ui]
columns = 5
cell_size = 180
padding = 12
font = "Helvetica 10"
top_gap = 4
title_gap = 4
row_gap = 8
max_image_cache = 600
nowplaying_cover_size = 420
nowplaying_title_font = "Courier 30 bold"
nowplaying_text_font = "Courier 17"
nowplaying_current_font = "Courier 17 bold"
nowplaying_bio_font = "Courier 17"
help_font = "Courier 11"
loading_font = "Courier 18 bold"
